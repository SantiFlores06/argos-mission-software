argos_state_estimator:
  ros__parameters:
    divergence_threshold: 5.0
    dead_reckoning_timeout_s: 3.0
    publish_rate_hz: 50.0

# robot_localization EKF node parameters (used in production, wraps EKFStateEstimator)
ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /fmu/out/vehicle_local_position
    odom0_config: [true, true, true,
                   false, false, false,
                   true, true, true,
                   false, false, false,
                   false, false, false]
    odom0_differential: false

    imu0: /fmu/out/vehicle_imu
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  true, false, false]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true
